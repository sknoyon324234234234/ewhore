<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Ewhore Shop" />
    <meta name="description" content="Ewhore Shop - The premium destination for exclusive digital content. Shop now for the best ewhore packs and store items." />
    <meta name="keywords" content="ewhore, ewhore store, ewhore pack, ewhore shop, premium ewhore, exclusive ewhore content" />
    <meta property="og:title" content="Ewhore Shop" />
    <meta property="og:description" content="Ewhore Shop - The premium destination for exclusive digital content." />
    <meta property="og:url" content="https://ewhore.shop/" />
    <meta property="og:type" content="website" />
    <link rel="canonical" href="https://ewhore.shop/" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>Ewhore Shop</title>
    
    <!-- Schema.org JSON-LD for Google Sitelinks -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Ewhore Shop",
      "url": "https://ewhore.shop/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://ewhore.shop/shop?q={search_term_string}",
        "query-input": "required name=search_term_string"
      },
      "hasPart": [
        {
          "@type": "WebPage",
          "name": "Shop now",
          "url": "https://ewhore.shop/shop"
        },
        {
          "@type": "WebPage",
          "name": "Login",
          "url": "https://ewhore.shop/auth"
        },
        {
          "@type": "WebPage",
          "name": "Privacy Policy",
          "url": "https://ewhore.shop/legal#privacy"
        },
        {
          "@type": "WebPage",
          "name": "Terms of Service",
          "url": "https://ewhore.shop/legal#terms"
        },
        {
          "@type": "WebPage",
          "name": "Support",
          "url": "https://t.me/EwhoreStoreX"
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
